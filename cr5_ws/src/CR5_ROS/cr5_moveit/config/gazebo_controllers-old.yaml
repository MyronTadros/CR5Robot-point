joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

cr5_joint_trajectory_controller:
  type: effort_controllers/JointTrajectoryController
  joints:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6

  gains:
    joint1: {p: 600.0, i: 0.0, d: 80.0, i_clamp: 0.0}
    joint2: {p: 1200.0, i: 0.0, d: 300.0, i_clamp: 0.0}
    joint3: {p: 900.0, i: 0.0, d: 220.0, i_clamp: 0.0}
    joint4: {p: 350.0, i: 0.0, d: 80.0, i_clamp: 0.0}
    joint5: {p: 250.0, i: 0.0, d: 60.0, i_clamp: 0.0}
    joint6: {p: 120.0, i: 0.0, d: 35.0, i_clamp: 0.0}

  constraints:
    goal_time: 2.0
    stopped_velocity_tolerance: 0.1
  stop_trajectory_duration: 0.5
  state_publish_rate: 50
  action_monitor_rate: 20
